<!DOCTYPE html>
<html>
<head><title>Password Reset Request</title></head>
<body>
    <div style="font-family: Arial, sans-serif; padding: 20px;">
        <h2>Password Reset Configuration</h2>
        <p>Hello <strong>{{Name}}</strong>,</p>
        <p>Please use the following One-Time Password (OTP) to proceed with your password reset request. This code will expire in 15 minutes.</p>
        <div style="font-size: 24px; font-weight: bold; padding: 10px; background-color: #f4f4f4; border-radius: 5px; text-align: center;">
            {{OTP}}
        </div>
        <p>If you did not request this, please ignore this email.</p>
        <p>Best regards,<br>The Examination System Team</p>
    </div>
</body>
</html>
